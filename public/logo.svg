<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Green rounded square background -->
  <rect width="200" height="200" rx="36" fill="#00A651"/>

  <!-- Ticket shape: main body -->
  <rect x="30" y="72" width="140" height="56" rx="8" fill="white"/>

  <!-- Ticket perforated notch left -->
  <circle cx="30" cy="100" r="12" fill="#00A651"/>

  <!-- Ticket perforated notch right -->
  <circle cx="170" cy="100" r="12" fill="#00A651"/>

  <!-- Dashed perforation line -->
  <line x1="100" y1="76" x2="100" y2="124"
        stroke="#00A651" stroke-width="3"
        stroke-dasharray="5 4" stroke-linecap="round"/>

  <!-- Star / sparkle on ticket stub left side -->
  <circle cx="65" cy="100" r="6" fill="#00A651"/>

  <!-- Text lines on ticket right side -->
  <rect x="114" y="90" width="38" height="5" rx="2.5" fill="#00A651" opacity="0.35"/>
  <rect x="114" y="103" width="26" height="5" rx="2.5" fill="#00A651" opacity="0.25"/>
</svg>
